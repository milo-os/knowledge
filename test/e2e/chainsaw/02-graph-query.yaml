apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: graph-query
spec:
  steps:
    - name: submit-graph-query
      try:
        - apply:
            resource:
              apiVersion: knowledge.miloapis.com/v1alpha1
              kind: GraphQuery
              metadata:
                name: ingress-graph
                namespace: default
              spec:
                root:
                  apiGroup: networking.k8s.io
                  kind: Ingress
                  name: app-ingress
                  namespace: default
                  controlPlaneContextRef:
                    kind: Project
                    name: default
                traverse:
                  maxDepth: 5
                  maxNodes: 100
                  direction: Outbound
    - name: assert-graph-result
      try:
        - script:
            timeout: 60s
            content: |
              kubectl get graphquery ingress-graph -n default -o json | \
                jq -e '.status.nodes | length >= 4'
