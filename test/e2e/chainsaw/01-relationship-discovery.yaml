apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: relationship-discovery
spec:
  steps:
    - name: create-workload
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: app-config
                namespace: default
              data:
                key: value
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: app
                namespace: default
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: demo
                template:
                  metadata:
                    labels:
                      app: demo
                  spec:
                    containers:
                      - name: app
                        image: nginx:alpine
                        env:
                          - name: CONFIG_VALUE
                            valueFrom:
                              configMapKeyRef:
                                name: app-config
                                key: key
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: app-svc
                namespace: default
              spec:
                selector:
                  app: demo
                ports:
                  - port: 80
        - apply:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: app-ingress
                namespace: default
              spec:
                rules:
                  - host: demo.example.com
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: app-svc
                              port:
                                number: 80
    - name: assert-relationships-created
      try:
        - assert:
            timeout: 90s
            resource:
              apiVersion: knowledge.miloapis.com/v1alpha1
              kind: ResourceRelationship
              metadata:
                namespace: default
              spec:
                relationshipType:
                  name: references-config
                subject:
                  kind: Deployment
                  name: app
                object:
                  kind: ConfigMap
                  name: app-config
        - assert:
            timeout: 90s
            resource:
              apiVersion: knowledge.miloapis.com/v1alpha1
              kind: ResourceRelationship
              metadata:
                namespace: default
              spec:
                relationshipType:
                  name: selects-pods-of
                subject:
                  kind: Service
                  name: app-svc
                object:
                  kind: Deployment
                  name: app
        - assert:
            timeout: 90s
            resource:
              apiVersion: knowledge.miloapis.com/v1alpha1
              kind: ResourceRelationship
              metadata:
                namespace: default
              spec:
                relationshipType:
                  name: routes-to
                subject:
                  kind: Ingress
                  name: app-ingress
                object:
                  kind: Service
                  name: app-svc
