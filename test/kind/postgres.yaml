apiVersion: v1
kind: Secret
metadata:
  name: knowledge-postgres
type: Opaque
stringData:
  POSTGRES_USER: knowledge
  POSTGRES_PASSWORD: knowledge
  POSTGRES_DB: knowledge
  dsn: "postgres://knowledge:knowledge@postgres.knowledge-system.svc.cluster.local:5432/knowledge?sslmode=disable"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: knowledge-postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "knowledge"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
