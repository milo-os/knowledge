# Demo seed data — do not hand-edit. Re-run: kubectl apply -k config/samples/
#
# Only relationships that cannot be auto-discovered by a RelationshipPolicy live
# here (e.g. cross-API-group edges where neither endpoint has a field pointing
# at the other, or operational bootstrap relationships with no spec field).
# Certificate/HelmChart relationships are omitted — they are discovered
# automatically by the policies in relationshippolicies.yaml.
# User↔Organization membership is omitted — discovered via OrganizationMembership
# resources and the membership-of-user / membership-in-organization policies.
apiVersion: knowledge.miloapis.com/v1alpha1
kind: ResourceRelationship
metadata:
  name: api-backend-attached-main-gateway
  namespace: default
  labels:
    knowledge.miloapis.com/relationship-type: domain-attached-to-gateway
    knowledge.miloapis.com/source-type: Manual
    knowledge.miloapis.com/subject-kind: Ingress
spec:
  relationshipType:
    name: domain-attached-to-gateway
  subject:
    apiGroup: networking.k8s.io
    kind: Ingress
    name: api-backend
    namespace: default
    controlPlaneContextRef:
      kind: Project
      name: my-project
  object:
    apiGroup: gateway.networking.k8s.io
    kind: Gateway
    name: main-gateway
    namespace: default
    controlPlaneContextRef:
      kind: Project
      name: my-project
  source:
    type: Manual
