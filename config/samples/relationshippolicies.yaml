---
# Discovers HelmChart → HelmRepository edges from Flux HelmChart spec.sourceRef
apiVersion: knowledge.miloapis.com/v1alpha1
kind: RelationshipPolicy
metadata:
  name: helmchart-repository-policy
  namespace: knowledge-system
spec:
  controlPlaneContextRef:
    kind: Platform
    name: local
  relationshipType:
    name: helmchart-sourced-from-helmrepository
  subject:
    apiGroup: source.toolkit.fluxcd.io
    kind: HelmChart
    namespaces: []
  discovery:
    expression: |
      "sourceRef" in subject.spec && subject.spec.sourceRef.kind == "HelmRepository" ?
        [{"apiGroup": "source.toolkit.fluxcd.io", "kind": "HelmRepository", "name": subject.spec.sourceRef.name, "namespace": subject.metadata.namespace}] :
        []
