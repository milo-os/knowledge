apiVersion: v1
kind: Service
metadata:
  name: knowledge-apiserver
  namespace: knowledge-system
  labels:
    app: knowledge-apiserver
spec:
  type: ClusterIP
  selector:
    app: knowledge-apiserver
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: knowledge-apiserver
  namespace: knowledge-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: knowledge-system
