apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-apiserver
  namespace: knowledge-system
  labels:
    app: knowledge-apiserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-apiserver
  template:
    metadata:
      labels:
        app: knowledge-apiserver
    spec:
      serviceAccountName: knowledge-apiserver
      containers:
        - name: apiserver
          image: knowledge-apiserver:latest
          imagePullPolicy: IfNotPresent
          command:
            - /knowledge
            - apiserver
          args:
            - --secure-port=6443
            - --postgres-dsn=$(POSTGRES_DSN)
            - --audit-log-path=-
            - --audit-log-maxage=0
            - --audit-log-maxbackup=0
            - --cert-dir=/tmp
            - --v=2
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: knowledge-postgres
                  key: dsn
          ports:
            - name: https
              containerPort: 6443
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: https
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
