apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-controller-manager
  namespace: knowledge-system
  labels:
    app.kubernetes.io/name: knowledge-controller-manager
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledge-controller-manager
        app.kubernetes.io/component: controller-manager
    spec:
      serviceAccountName: knowledge-controller-manager
      containers:
        - name: manager
          image: knowledge-controller-manager:latest
          imagePullPolicy: IfNotPresent
          command:
            - /knowledge
            - controller-manager
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: probes
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
