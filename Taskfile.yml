version: '3'

vars:
  IMAGE_NAME: "knowledge"
  IMAGE_TAG: "dev"
  TEST_INFRA_CLUSTER_NAME: "test-infra"
  TEST_INFRA_REPO_REF: 'v0.6.0'

includes:
  test-infra:
    taskfile: https://raw.githubusercontent.com/datum-cloud/test-infra/{{.TEST_INFRA_REPO_REF}}/Taskfile.yml
    vars:
      REPO_REF: "{{.TEST_INFRA_REPO_REF}}"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  dev:build:
    desc: Build the knowledge Docker image
    cmds:
      - docker build -t "{{.IMAGE_NAME}}:{{.IMAGE_TAG}}" .

  dev:load:
    desc: Load the dev image into the kind cluster
    cmds:
      - kind load docker-image "{{.IMAGE_NAME}}:{{.IMAGE_TAG}}" --name "{{.TEST_INFRA_CLUSTER_NAME}}"

  dev:postgres:
    desc: Deploy Postgres into the kind cluster for local development
    cmds:
      - task test-infra:kubectl -- create namespace knowledge-system --dry-run=client -o yaml | kubectl apply -f -
      - task test-infra:kubectl -- apply -n knowledge-system -f test/kind/postgres.yaml
      - task test-infra:kubectl -- rollout status statefulset/postgres -n knowledge-system --timeout=180s

  dev:deploy:
    desc: Deploy knowledge service to the kind cluster (e2e overlay)
    cmds:
      - task test-infra:kubectl -- apply -k config/overlays/e2e/
      - task test-infra:kubectl -- rollout status deployment/knowledge-apiserver -n knowledge-system --timeout=300s
      - task test-infra:kubectl -- rollout status deployment/knowledge-controller-manager -n knowledge-system --timeout=300s

  dev:seed:
    desc: Apply sample RelationshipTypes, RelationshipPolicies, and ResourceRelationships
    cmds:
      - task: test-infra:kubectl
        vars:
          ARGS: "apply -k config/samples/"

  test:e2e:
    desc: Run chainsaw e2e tests
    cmds:
      - chainsaw test --parallel 1 test/e2e/chainsaw/
