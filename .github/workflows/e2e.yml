name: E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    name: Chainsaw E2E
    runs-on: ubuntu-latest
    env:
      TASK_X_REMOTE_TASKFILES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.25.0'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Spin up kind cluster
        run: task --yes test-infra:cluster-up

      - name: Deploy Postgres
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: |
          kubectl create namespace knowledge-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n knowledge-system -f test/kind/postgres.yaml
          kubectl rollout status statefulset/postgres -n knowledge-system --timeout=180s

      - name: Build container image
        run: task dev:build

      - name: Load image into kind
        run: task dev:load

      - name: Deploy knowledge service
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: |
          task --yes test-infra:kubectl -- apply -k config/overlays/e2e/
          task --yes test-infra:kubectl -- rollout status deployment/knowledge-apiserver \
            -n knowledge-system --timeout=300s
          task --yes test-infra:kubectl -- rollout status deployment/knowledge-controller-manager \
            -n knowledge-system --timeout=300s

      - name: Apply sample data
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: task --yes test-infra:kubectl -- apply -k config/samples/

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.14

      - name: Run E2E tests
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: task test:e2e
